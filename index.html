<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Interval Trees 2D — Nelson Ponce Luna</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css"/>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

  <style>
/* ── Tokens ──────────────────────────────────────────────── */
:root {
  --bg:      oklch(98.3% 0.006 85);
  --bg-2:    oklch(95.8% 0.009 85);
  --bg-card: #ffffff;
  --ink:     oklch(14%   0.011 240);
  --ink-2:   oklch(32%   0.008 240);
  --ink-3:   oklch(52%   0.006 240);
  --ink-4:   oklch(72%   0.005 240);
  --rule:    oklch(88%   0.006 85);
  --rule-2:  oklch(92%   0.006 85);
  --accent:  oklch(54%   0.18  48);   /* burnt amber */
  --accent-2:oklch(40%   0.14  48);
  --green:   oklch(45%   0.13  145);
  --blue:    oklch(45%   0.14  250);
  --red:     oklch(50%   0.19  25);

  --col-text:  720px;
  --col-wide:  820px;
  --col-full:  1120px;

  --f-disp: 'Instrument Serif', serif;
  --f-body: 'Newsreader', Georgia, serif;
  --f-mono: 'JetBrains Mono', ui-monospace, monospace;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--f-body);
  font-size: 1.125rem;
  line-height: 1.72;
  font-weight: 400;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  font-feature-settings: "ss01", "onum";
}

/* ── Progress bar ────────────────────────────────────────── */
.progress {
  position: fixed; top: 0; left: 0; right: 0;
  height: 2px; z-index: 100;
  background: transparent;
}
.progress-fill {
  height: 100%;
  background: var(--accent);
  width: 0%;
  transition: width 0.1s linear;
}

/* ── Top meta bar ────────────────────────────────────────── */
.topbar {
  max-width: var(--col-full);
  margin: 0 auto;
  padding: 1.5rem 2rem 0;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-family: var(--f-mono);
  font-size: 0.68rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink-3);
}
.topbar .dot {
  display: inline-block; width: 6px; height: 6px;
  background: var(--accent); border-radius: 50%;
  margin-right: 0.5rem; vertical-align: middle;
}

/* ── Main container ──────────────────────────────────────── */
.paper {
  max-width: var(--col-text);
  margin: 0 auto;
  padding: 6rem 2rem 8rem;
}

/* ── Hero ───────────────────────────────────────────────── */
.hero { margin-bottom: 5rem; }
.hero-kicker {
  font-family: var(--f-mono);
  font-size: 0.72rem;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 2rem;
  display: flex;
  align-items: center;
  gap: 0.7rem;
}
.hero-kicker::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--rule);
}
.hero-title {
  font-family: var(--f-disp);
  font-size: clamp(3rem, 6.5vw, 5.5rem);
  font-weight: 400;
  line-height: 1.02;
  letter-spacing: -0.025em;
  margin-bottom: 1.2rem;
  text-wrap: balance;
}
.hero-title em {
  font-style: italic;
  color: var(--accent);
  font-weight: 400;
}
.hero-sub {
  font-family: var(--f-body);
  font-size: 1.3rem;
  line-height: 1.45;
  color: var(--ink-2);
  font-style: italic;
  max-width: 560px;
  margin-bottom: 3rem;
  text-wrap: pretty;
}
.hero-meta {
  display: flex;
  gap: 3rem;
  padding-top: 1.3rem;
  border-top: 1px solid var(--rule);
  flex-wrap: wrap;
}
.hero-meta-item { }
.hero-meta-label {
  font-family: var(--f-mono);
  font-size: 0.62rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink-3);
  margin-bottom: 0.3rem;
}
.hero-meta-value {
  font-size: 0.95rem;
  color: var(--ink);
  font-weight: 500;
}

/* ── Abstract ───────────────────────────────────────────── */
.abstract {
  margin-bottom: 6rem;
  padding: 2.5rem 0;
  border-top: 1px solid var(--ink);
  border-bottom: 1px solid var(--rule);
}
.abstract-label {
  font-family: var(--f-mono);
  font-size: 0.68rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ink-3);
  margin-bottom: 1.3rem;
}
.abstract-body {
  font-size: 1.18rem;
  line-height: 1.65;
  color: var(--ink);
  text-wrap: pretty;
}
.abstract-body em { color: var(--ink-2); }
.abstract-kw {
  display: flex;
  flex-wrap: wrap;
  gap: 0.4rem;
  margin-top: 2rem;
}
.abstract-kw span {
  font-family: var(--f-mono);
  font-size: 0.62rem;
  letter-spacing: 0.08em;
  color: var(--ink-3);
  padding: 0.22rem 0.6rem;
  border: 1px solid var(--rule);
  border-radius: 999px;
  background: var(--bg-card);
}

/* Code box replacement for console -> styled text box */
.cb-body {
  padding: 1rem 1.1rem;
  background: linear-gradient(180deg, rgba(255,255,255,0.85), rgba(250,250,250,0.8));
  border: 1px solid rgba(0,0,0,0.06);
  border-left: 3px solid var(--accent);
  border-radius: 6px;
  font-family: var(--f-mono);
  font-size: 0.92rem;
  white-space: pre-wrap;
  color: var(--ink-2);
  margin-top: 0.8rem;
}

/* ── Section ────────────────────────────────────────────── */
.sec {
  margin-bottom: 5.5rem;
  opacity: 0;
  transform: translateY(16px);
  transition: opacity 0.6s ease, transform 0.6s ease;
}
.sec.vis { opacity: 1; transform: none; }

.sec-head {
  display: flex;
  align-items: baseline;
  gap: 1.2rem;
  margin-bottom: 2rem;
}
.sec-num {
  font-family: var(--f-mono);
  font-size: 0.75rem;
  font-weight: 500;
  letter-spacing: 0.14em;
  color: var(--accent);
  padding-top: 0.35rem;
  flex-shrink: 0;
}
.sec-title {
  font-family: var(--f-disp);
  font-size: clamp(1.75rem, 3vw, 2.4rem);
  font-weight: 400;
  line-height: 1.15;
  letter-spacing: -0.015em;
  text-wrap: balance;
}

.sec-body p {
  margin-bottom: 1.2rem;
  text-wrap: pretty;
}
.sec-body ul {
  list-style: none;
  margin-bottom: 1.5rem;
  padding-left: 0;
}
.sec-body li {
  position: relative;
  padding-left: 1.8rem;
  margin-bottom: 0.8rem;
  line-height: 1.6;
}
.sec-body li::before {
  content: '';
  position: absolute;
  left: 0.2rem;
  top: 0.85em;
  width: 6px;
  height: 1px;
  background: var(--accent);
}

.sec-body h3 {
  font-family: var(--f-disp);
  font-size: 1.5rem;
  font-weight: 400;
  font-style: italic;
  line-height: 1.3;
  margin: 3rem 0 1rem;
  color: var(--ink);
  letter-spacing: -0.01em;
}
.sec-body h3::before {
  content: attr(data-n);
  font-family: var(--f-mono);
  font-style: normal;
  font-size: 0.7rem;
  letter-spacing: 0.1em;
  color: var(--ink-3);
  margin-right: 0.7rem;
  vertical-align: 0.2em;
}

strong { font-weight: 600; color: var(--ink); }
em { font-style: italic; }
a { color: var(--accent); text-decoration: none; border-bottom: 1px solid var(--accent); }

/* ── Figure (breakout) ──────────────────────────────────── */
.fig {
  margin: 3rem calc(50% - min(var(--col-wide), 100vw - 4rem) / 2);
  width: min(var(--col-wide), 100vw - 4rem);
  background: var(--bg-card);
  border: 1px solid var(--rule);
  border-radius: 2px;
  overflow: hidden;
}
.fig-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.7rem 1.3rem;
  border-bottom: 1px solid var(--rule);
}
.fig-n {
  font-family: var(--f-mono);
  font-size: 0.65rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--accent);
  font-weight: 500;
}
.fig-lbl {
  font-family: var(--f-body);
  font-size: 0.82rem;
  font-style: italic;
  color: var(--ink-2);
  text-align: right;
}
.fig-inner {
  padding: 1.5rem 1.3rem 1.2rem;
}
.fig-cap {
  padding: 0.85rem 1.3rem 1rem;
  border-top: 1px solid var(--rule-2);
  font-size: 0.82rem;
  line-height: 1.55;
  color: var(--ink-3);
  font-style: italic;
}
.fig-cap strong { color: var(--ink-2); font-style: normal; font-weight: 600; }

/* ── Pull quote ─────────────────────────────────────────── */
.pq {
  margin: 3.5rem 0;
  padding-left: 0;
  font-family: var(--f-disp);
  font-size: clamp(1.6rem, 2.8vw, 2.1rem);
  font-weight: 400;
  font-style: italic;
  line-height: 1.28;
  letter-spacing: -0.015em;
  color: var(--ink);
  text-wrap: balance;
  position: relative;
}
.pq::before {
  content: '';
  display: block;
  width: 48px;
  height: 1px;
  background: var(--accent);
  margin-bottom: 1.5rem;
}

/* ── Code ───────────────────────────────────────────────── */
.cb {
  margin: 2rem calc(50% - min(var(--col-wide), 100vw - 4rem) / 2);
  width: min(var(--col-wide), 100vw - 4rem);
  background: oklch(14% 0.008 240);
  border-radius: 3px;
  overflow: hidden;
}
.cb-head {
  padding: 0.75rem 1.3rem;
  background: oklch(17% 0.009 240);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.cb-lang {
  font-family: var(--f-mono);
  font-size: 0.62rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: oklch(60% 0.006 240);
}
.cb-badge {
  font-family: var(--f-mono);
  font-size: 0.58rem;
  color: oklch(68% 0.14 48);
  letter-spacing: 0.1em;
}
.cb-pre {
  padding: 1.1rem 1.4rem;
  overflow-x: auto;
  font-family: var(--f-mono);
  font-size: 0.75rem;
  line-height: 1.62;
  color: oklch(82% 0.006 85);
}
.cb-pre pre { margin: 0; }
.code-kw      { color: oklch(70% 0.15 295); }
.code-fn      { color: oklch(75% 0.13 195); }
.code-str     { color: oklch(75% 0.13 140); }
.code-comment { color: oklch(48% 0.006 240); font-style: italic; }
.code-type    { color: oklch(75% 0.14 48); }
.inline-code {
  font-family: var(--f-mono);
  font-size: 0.82em;
  background: var(--bg-2);
  padding: 0.12em 0.4em;
  border-radius: 3px;
  color: var(--accent-2);
}

/* ── Equation ───────────────────────────────────────────── */
.eq-block {
  text-align: center;
  margin: 1.8rem 0;
  padding: 1rem 0;
  overflow-x: auto;
}

/* ── Table ──────────────────────────────────────────────── */
.ptable-wrap {
  margin: 2.5rem calc(50% - min(var(--col-wide), 100vw - 4rem) / 2);
  width: min(var(--col-wide), 100vw - 4rem);
  overflow-x: auto;
}
.ptable { width: 100%; border-collapse: collapse; font-size: 0.87rem; }
.ptable th {
  font-family: var(--f-mono);
  font-size: 0.58rem;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink-3);
  text-align: left;
  padding: 0.7rem 0.95rem;
  border-bottom: 1px solid var(--ink);
  white-space: nowrap;
}
.ptable td {
  padding: 0.7rem 0.95rem;
  border-bottom: 1px solid var(--rule-2);
  line-height: 1.45;
  vertical-align: middle;
}
.ptable tbody tr:hover td { background: var(--bg-2); }
.ptable tbody tr.tr-hi td {
  background: oklch(97% 0.025 48 / 0.6);
  font-weight: 500;
}
.ptable tbody tr.tr-hi:hover td { background: oklch(96% 0.035 48 / 0.7); }
.td-n { color: var(--ink-3); }
.td-g { color: var(--green); font-weight: 600; }

/* ── Proof callout ──────────────────────────────────────── */
.proof {
  margin: 2rem calc(50% - min(var(--col-wide), 100vw - 4rem) / 2);
  width: min(var(--col-wide), 100vw - 4rem);
  border: 1px solid var(--rule);
  border-left: 2px solid var(--ink);
  background: var(--bg-card);
  padding: 1.1rem 1.3rem 1.2rem;
  border-radius: 2px;
}
.proof-hd {
  font-family: var(--f-mono);
  font-size: 0.6rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink-3);
  margin-bottom: 0.7rem;
}
.proof-bd {
  font-size: 0.97rem;
  line-height: 1.65;
  color: var(--ink-2);
  font-style: italic;
}
.proof-bd .katex { font-style: normal; }
.qed {
  display: inline-block;
  margin-left: 0.3rem;
  color: var(--ink);
  font-style: normal;
  font-weight: 500;
}

/* ── Inline code ────────────────────────────────────────── */
.inline-code {
  font-family: var(--f-mono);
  font-size: 0.82em;
  padding: 0.1em 0.35em;
  background: var(--bg-2);
  border: 1px solid var(--rule-2);
  border-radius: 2px;
  color: var(--ink);
  white-space: nowrap;
}

/* ── TL;DR callout ──────────────────────────────────────── */
.tldr {
  margin: 2rem calc(50% - min(var(--col-wide), 100vw - 4rem) / 2);
  width: min(var(--col-wide), 100vw - 4rem);
  display: grid;
  grid-template-columns: 170px 1fr;
  gap: 1.2rem;
  padding: 1.1rem 1.3rem;
  background: var(--bg-card);
  border: 1px solid var(--rule);
  border-left: 2px solid var(--accent);
  border-radius: 2px;
}
.tldr-lbl {
  font-family: var(--f-mono);
  font-size: 0.62rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--accent);
  align-self: start;
  padding-top: 0.2rem;
}
.tldr-body { font-size: 0.97rem; line-height: 1.6; color: var(--ink-2); }
.tldr-body ul { list-style: none; display: flex; flex-direction: column; gap: 0.28rem; }
.tldr-body li::before {
  content: '·'; color: var(--accent);
  margin-right: 0.5rem; font-weight: 700;
}
.tldr-body code {
  font-family: var(--f-mono); font-size: 0.82em;
  color: var(--ink); background: var(--bg-2);
  padding: 0.05em 0.32em; border-radius: 2px;
}

/* ── Timeline (detección) ───────────────────────────────── */
.timeline {
  margin: 1.6rem 0 2rem;
  display: grid;
  grid-template-columns: 110px 1fr;
  gap: 0.2rem 1.2rem;
  font-size: 0.95rem;
  line-height: 1.55;
}
.tl-t {
  font-family: var(--f-mono);
  font-size: 0.68rem;
  letter-spacing: 0.1em;
  color: var(--accent);
  padding-top: 0.25rem;
  border-right: 1px solid var(--rule);
  padding-right: 0.9rem;
  text-transform: uppercase;
}
.tl-d {
  color: var(--ink-2);
  padding-bottom: 0.9rem;
  border-bottom: 1px solid var(--rule-2);
  padding-left: 0.1rem;
}
.timeline > div:nth-last-child(-n+2) { border-bottom: none; padding-bottom: 0; }
.timeline strong { color: var(--ink); font-weight: 600; }

/* ── Note callout (grounded anchor) ─────────────────────── */
.note {
  margin: 1.4rem 0;
  padding: 0.9rem 1.1rem;
  background: var(--bg-2);
  border-left: 2px solid var(--ink-3);
  border-radius: 2px;
  font-size: 0.95rem;
  line-height: 1.6;
  color: var(--ink-2);
}
.note-label {
  font-family: var(--f-mono);
  font-size: 0.6rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink-3);
  margin-bottom: 0.3rem;
}

/* ── Walk-through trace table ───────────────────────────── */
.trace {
  margin: 1.6rem calc(50% - min(var(--col-wide), 100vw - 4rem) / 2);
  width: min(var(--col-wide), 100vw - 4rem);
  border: 1px solid var(--rule);
  border-radius: 2px;
  overflow: hidden;
}
.trace-hd {
  padding: 0.7rem 1rem;
  background: var(--bg-2);
  border-bottom: 1px solid var(--rule);
  font-family: var(--f-mono);
  font-size: 0.6rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink-3);
}
.trace table { width: 100%; border-collapse: collapse; font-size: 0.86rem; font-family: var(--f-mono); }
.trace th { text-align: left; padding: 0.55rem 0.9rem;
  font-size: 0.58rem; letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--ink-3); font-weight: 500;
  border-bottom: 1px solid var(--ink);
}
.trace td { padding: 0.52rem 0.9rem; border-bottom: 1px solid var(--rule-2); vertical-align: middle; color: var(--ink-2); }
.trace td.tag-hit { color: var(--green); font-weight: 600; }
.trace td.tag-prn { color: var(--red); font-weight: 600; }
.trace td.tag-vis { color: var(--blue); }
.trace tbody tr:last-child td { border-bottom: none; }

/* ── Results grid ───────────────────────────────────────── */
.results-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 1rem;
  margin: 2.5rem calc(50% - min(var(--col-wide), 100vw - 4rem) / 2);
  width: min(var(--col-wide), 100vw - 4rem);
}
.rcard {
  background: var(--bg-card);
  border: 1px solid var(--rule);
  padding: 1.2rem 1.1rem;
  border-radius: 2px;
}
.rcard-v {
  font-family: var(--f-disp);
  font-size: 2.2rem;
  font-weight: 400;
  line-height: 1;
  color: var(--ink);
  letter-spacing: -0.02em;
  margin-bottom: 0.45rem;
}
.rcard-v em { font-style: italic; color: var(--accent); }
.rcard-l {
  font-family: var(--f-mono);
  font-size: 0.6rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink-3);
  line-height: 1.4;
}
@media (max-width: 800px) {
  .results-grid { grid-template-columns: repeat(2, 1fr); }
}

/* ── References ─────────────────────────────────────────── */
.refs {
  list-style: none;
  counter-reset: ref;
}
.ref {
  counter-increment: ref;
  display: flex;
  gap: 1rem;
  margin-bottom: 1rem;
  font-size: 0.95rem;
  line-height: 1.5;
  color: var(--ink-2);
}
.ref::before {
  content: counter(ref, decimal-leading-zero);
  font-family: var(--f-mono);
  font-size: 0.7rem;
  color: var(--accent);
  padding-top: 0.25rem;
  letter-spacing: 0.08em;
  flex-shrink: 0;
  width: 2rem;
}
.ref > span { min-width: 0; flex: 1; }

/* ── Foot ───────────────────────────────────────────────── */
.foot {
  max-width: var(--col-text);
  margin: 0 auto;
  padding: 3rem 2rem 2rem;
  border-top: 1px solid var(--rule);
  display: flex;
  justify-content: space-between;
  font-family: var(--f-mono);
  font-size: 0.64rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink-3);
}

/* ── Animations ─────────────────────────────────────────── */
@keyframes fadeInUp { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform: none; } }
.svg-fade-in { animation: fadeInUp 0.4s ease both; }

/* ── Responsive ─────────────────────────────────────────── */
@media (max-width: 720px) {
  .paper { padding: 4rem 1.5rem 5rem; }
  .topbar { padding: 1rem 1.5rem 0; font-size: 0.6rem; }

<script>// ── Shared React hooks & Math component ──────────────────────────────────────

const { useState, useEffect, useRef, useCallback, useMemo } = React;

// KaTeX inline/display
const M = ({ t, d = false }) => {
  const ref = useRef(null);
  useEffect(() => {
    if (ref.current) {
      katex.render(t, ref.current, {
        throwOnError: false,
        displayMode: d,
      });
    }
  }, [t, d]);
  return React.createElement('span', { ref });
};

// IntersectionObserver hook — triggers once when element enters viewport
const useInView = (threshold = 0.12) => {
  const ref = useRef(null);
  const [visible, setVisible] = useState(false);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const obs = new IntersectionObserver(
      ([entry]) => { if (entry.isIntersecting) setVisible(true); },
      { threshold }
    );
    obs.observe(el);
    return () => obs.disconnect();
  }, [threshold]);
  return [ref, visible];
};

// Interval overlap check
const overlaps1D = (al, ah, bl, bh) => al <= bh && bl <= ah;

<script>// ── Fig 4 — Árbol de Intervalos Aumentado: animación de consulta con poda ──
// Vista doble: barra numérica arriba muestra los intervalos en el eje;
// árbol BST abajo muestra la estructura con la propiedad max aumentada.
// La animación recorre el árbol respondiendo a la consulta q = [10, 20].

const Fig4 = () => {
  const [step, setStep] = useState(-1);
  const [paused, setPaused] = useState(false);

  useEffect(() => {
    if (paused) return;
    const t = setInterval(() => setStep(s => (s >= 9 ? -1 : s + 1)), 1100);
    return () => clearInterval(t);
  }, [paused]);

  // ── Tree nodes (BST ordered by interval lower endpoint l) ────────────────
  const nodes = [
    { id: 0, x: 230, y: 250, iv: [8,  22], m: 28 },
    { id: 1, x: 120, y: 315, iv: [3,  12], m: 18 },
    { id: 2, x: 340, y: 315, iv: [16, 28], m: 28 },
    { id: 3, x: 58,  y: 380, iv: [1,  6],  m: 6  },
    { id: 4, x: 182, y: 380, iv: [9,  18], m: 18 },
    { id: 5, x: 280, y: 380, iv: [14, 22], m: 22 },
    { id: 6, x: 402, y: 380, iv: [20, 28], m: 28 },
  ];
  const edges = [[0,1],[0,2],[1,3],[1,4],[2,5],[2,6]];

  // Query q = [10, 20]
  const Q = [10, 20];
  const visitSeq = [0, 1, 4, 2, 5];   // Order in which nodes are visited
  const pruned   = [3, 6];
  const hits     = [4, 5];

  const nodeState = id => {
    if (step < 0) return 'idle';
    const vi = visitSeq.indexOf(id);
    const visited = vi !== -1 && vi <= step;
    if (hits.includes(id) && visited) return 'hit';
    if (pruned.includes(id) && step >= visitSeq.length) return 'pruned';
    if (visited) return 'visited';
    return 'idle';
  };

  // State color palette (refined)
  const S = {
    idle:    { fill: '#fafaf7', stroke: '#d8d8d0', sw: 1,   tc: '#4a4a45' },
    visited: { fill: '#dbe4ff', stroke: '#1e3a8a', sw: 2.2, tc: '#1e3a8a' },
    hit:     { fill: '#d3f9d8', stroke: '#15803d', sw: 2.5, tc: '#15803d' },
    pruned:  { fill: '#ffe3e3', stroke: '#991b1b', sw: 1.8, tc: '#991b1b' },
  };

  const W = 460, SVGH = 458;
  const NLX0 = 36, NLX1 = 430, NLMIN = 0, NLMAX = 30;
  const NLY = 110;

  const nlX = v => NLX0 + ((v - NLMIN) / (NLMAX - NLMIN)) * (NLX1 - NLX0);
  const barRowY = i => NLY - 14 - i * 12;

  const idleColors = ['#5f3dc4','#1e3a8a','#5f3dc4','#8a8a82','#15803d','#92400e','#5f3dc4'];

  const stateColor = (id, st) => {
    if (st === 'hit')    return '#15803d';
    if (st === 'pruned') return '#991b1b';
    if (st === 'visited') return '#1e3a8a';
    return idleColors[id];
  };

  const stepLabels = [
    'Visito raíz [8,22]  ·  max=28 ≥ q_l=10  →  descender por ambos lados',
    'Visito izq [3,12]   ·  max=18 ≥ 10      →  descender por ambos lados',
    '[9,18] solapa con [10,20]  ✓  hit',
    'Vuelvo a la raíz  →  visito der [16,28]  →  descender',
    '[14,22] solapa con [10,20]  ✓  hit',
    '[1,6]:  max = 6 < q_l = 10  →  poda completa del subárbol  ✗',
    '[20,28]:  l = 20 ≤ q_h = 20  →  verificar nodo',
    'Búsqueda completa  →  k = 2 resultados (logarítmico)',
    'Búsqueda completa  →  k = 2 resultados (logarítmico)',
    'Búsqueda completa  →  k = 2 resultados (logarítmico)',
  ];

  const descText = step >= 0
    ? stepLabels[Math.min(step, stepLabels.length - 1)]
    : 'q = [10, 20]  ·  click para pausar / reanudar';

  return React.createElement('div',
    {
      style: { cursor: 'pointer', userSelect: 'none' },
      onClick: () => setPaused(p => !p),
      title: 'Click para pausar / reanudar',
    },
    React.createElement('svg',
      { width: '100%', viewBox: `0 0 ${W} ${SVGH}`, style: { fontFamily: 'JetBrains Mono, monospace', overflow: 'visible' } },

      // ── Section header: number line ─────────────────────────────────────
      React.createElement('text', {
        x: NLX0, y: 14, fontSize: '7.5', fontWeight: '700',
        fill: '#8a8a82', letterSpacing: '0.14em'
      }, 'INTERVALOS ALMACENADOS · EJE NUMÉRICO'),

      // Interval bars
      ...nodes.map((n, i) => {
        const st = nodeState(n.id);
        const c  = stateColor(n.id, st);
        const y  = barRowY(i);
        const x1 = nlX(n.iv[0]), x2 = nlX(n.iv[1]);
        const isActive = st !== 'idle';
        const sw = isActive ? 5 : 2.5;
        return React.createElement('g', { key: `iv${i}` },
          React.createElement('line', {
            x1, y1: y, x2, y2: y,
            stroke: c, strokeWidth: sw, strokeLinecap: 'round',
            opacity: isActive ? 1 : 0.42,
            style: { transition: 'stroke 0.3s, stroke-width 0.25s, opacity 0.3s' }
          }),
          React.createElement('circle', {
            cx: x1, cy: y, r: isActive ? 4 : 2.5,
            fill: c, opacity: isActive ? 1 : 0.42,
            style: { transition: 'r 0.25s, opacity 0.3s' }
          }),
          React.createElement('circle', {
            cx: x2, cy: y, r: isActive ? 4 : 2.5,
            fill: c, opacity: isActive ? 1 : 0.42,
            style: { transition: 'r 0.25s, opacity 0.3s' }

<script>// ── Fig 5 — Árbol de Intervalos 2D Anidado: BW (exterior) → TP (interior) ──

const Fig5 = () => {
  const [step, setStep] = useState(0);
  const [paused, setPaused] = useState(false);

  useEffect(() => {
    if (paused) return;

  const phases = [
    { desc: 'Fase 1 · Consulta en eje BW: localizar nodos candidatos', hl: 'bw' },
    { desc: 'Fase 2 · Candidato BW[4–7]: sub-consulta en eje TP',      hl: 'tp1' },
    { desc: 'Fase 3 · Candidato BW[8–11]: sub-consulta en eje TP',     hl: 'tp2' },
    { desc: 'Fase 4 · Unión de resultados  →  O(log²n + k)',           hl: 'done' },
  ];

  const hl = phases[step].hl;

  const NW = 56, NH = 28;

        React.createElement('line', {

          markerEnd: 'url(#arrow5)', strokeDasharray: '4,3'

        React.createElement('text', {

<script>// ── FigDecompose — Solape 2D = solape en BW × solape en TP ────────────────
// Muestra dos rectángulos (origen y destino) en el plano BW × TP, proyecta sus
// intervalos sobre cada eje y resalta la intersección como producto cartesiano
// de los dos solapes 1D. Estático y denso en información.

const FigDecompose = () => {
  const W = 480, H = 310;
  const pad = { l: 78, b: 72, r: 26, t: 26 };
  const iW = W - pad.l - pad.r;
  const iH = H - pad.t - pad.b;
  const Dx = 24, Dy = 24;
  const px = v => pad.l + (v / Dx) * iW;
  const py = v => H - pad.b - (v / Dy) * iH;

  // Rectángulo origen (sistema interno) y destino (sistema del colaborador)
  const Rs = { bw: [3, 14], tp: [8, 20], c: '#1e3a8a', soft: '#dbe4ff', lbl: 'R₁ · Origen' };
  const Rd = { bw: [9, 21], tp: [4, 17], c: '#15803d', soft: '#d3f9d8', lbl: 'R₂ · Destino' };

  // Solape 1D por eje
  const bwOv = [Math.max(Rs.bw[0], Rd.bw[0]), Math.min(Rs.bw[1], Rd.bw[1])];
  const tpOv = [Math.max(Rs.tp[0], Rd.tp[0]), Math.min(Rs.tp[1], Rd.tp[1])];

  const rectOf = (R, opacity = 0.35) => React.createElement('rect', {
    x: px(R.bw[0]), y: py(R.tp[1]),
    width: px(R.bw[1]) - px(R.bw[0]),
    height: py(R.tp[0]) - py(R.tp[1]),
    fill: R.soft, stroke: R.c, strokeWidth: 1.8,
    fillOpacity: opacity, rx: 2
  });

  const Axis = ({ vals, axis }) => axis === 'x'
    ? vals.map(v => React.createElement('g', { key: `gx${v}` },
        React.createElement('line', {
          x1: px(v), y1: H - pad.b, x2: px(v), y2: H - pad.b + 4,
          stroke: '#8a8a82', strokeWidth: 0.8
        }),
        React.createElement('text', {
          x: px(v), y: H - pad.b + 13,
          textAnchor: 'middle', fontSize: '7.5', fill: '#8a8a82',
          fontFamily: 'JetBrains Mono, monospace'
        }, v)
      ))
    : vals.map(v => React.createElement('g', { key: `gy${v}` },
        React.createElement('line', {
          x1: pad.l - 4, y1: py(v), x2: pad.l, y2: py(v),
          stroke: '#8a8a82', strokeWidth: 0.8
        }),
        React.createElement('text', {
          x: pad.l - 7, y: py(v) + 3,
          textAnchor: 'end', fontSize: '7.5', fill: '#8a8a82',
          fontFamily: 'JetBrains Mono, monospace'
        }, v)
      ));

  // Proyección 1D sobre eje BW (en la parte inferior)
  const projY = H - pad.b + 28;
  const projTY = pad.l - 28;

  return React.createElement('svg', {
    width: '100%', viewBox: `0 0 ${W} ${H + 30}`,
    style: { overflow: 'visible', fontFamily: 'JetBrains Mono, monospace' }
  },
    // Plane bg
    React.createElement('rect', {
      x: pad.l, y: pad.t, width: iW, height: iH,
      fill: '#fafaf7', stroke: '#ebeae3'
    }),

    // Grid
    ...[0, 6, 12, 18, 24].flatMap(v => [
      React.createElement('line', {
        key: `gv${v}`, x1: px(v), y1: pad.t, x2: px(v), y2: H - pad.b,
        stroke: '#ebeae3', strokeWidth: 0.8
      }),
      React.createElement('line', {
        key: `gh${v}`, x1: pad.l, y1: py(v), x2: W - pad.r, y2: py(v),
        stroke: '#ebeae3', strokeWidth: 0.8
      })
    ]),

    // Ticks
    ...Axis({ vals: [0, 6, 12, 18, 24], axis: 'x' }),
    ...Axis({ vals: [0, 6, 12, 18, 24], axis: 'y' }),

    // Axis labels
    React.createElement('text', {
      x: pad.l + iW / 2, y: H - pad.b + 32,
      textAnchor: 'middle', fontSize: '8', fill: '#4a4a45',
      letterSpacing: '0.1em', fontWeight: 600
    }, 'BW (Booking Window)'),
    React.createElement('text', {
      x: 18, y: pad.t + iH / 2,
      textAnchor: 'middle', fontSize: '8', fill: '#4a4a45',
      letterSpacing: '0.1em', fontWeight: 600,
      transform: `rotate(-90, 18, ${pad.t + iH / 2})`
    }, 'TP (Travel Period)'),

    // Rectangles
    rectOf(Rs, 0.4),
    rectOf(Rd, 0.4),

    React.createElement('defs', null,

    // Rectangle labels

    React.createElement('line', {

    React.createElement('line', {

    }),
    React.createElement('line', {
      x1: px(bwOv[0]), y1: projY, x2: px(bwOv[1]), y2: projY,
      stroke: '#92400e', strokeWidth: 7, strokeLinecap: 'round'
    }),
    React.createElement('text', {
      x: (px(bwOv[0]) + px(bwOv[1])) / 2, y: projY + 20,
      textAnchor: 'middle', fontSize: '8.5', fill: '#92400e', fontWeight: 700
    }, `solape BW = [${bwOv[0]}, ${bwOv[1]}]`),

    // ── Proyección sobre TP (barra vertical a la izquierda) ────────────
    React.createElement('line', {
      x1: projTY - 6, y1: py(Rs.tp[0]), x2: projTY - 6, y2: py(Rs.tp[1]),

    React.createElement('line', {

                ['Segment Tree 2D',       h(M,{t:'O(n \\log^2 n)'}), h(M,{t:'O(\\log^2 n + k)'}),  h('span',null,'Misma consulta, pero factor extra ', h('em',null,'log n'), ' en memoria.')],
                ['Sweep line + BIT',      h(M,{t:'O(n \\log n)'}),   '— (offline)',                 'Excelente para batch; no soporta consultas ad-hoc posteriores.'],
                ['Interval Tree 2D ★',    h(M,{t:'O(n \\log^2 n)'}), h(M,{t:'O(\\log^2 n + k)'}),  'Peor caso garantizado, coste independiente del ancho de las ventanas y construcción estática sin rotaciones.'],
              ].map(([m, c, q, r], i) =>
                h('tr', { key: i, className: i === 10 ? 'tr-hi' : '' },
                  h('td', { style: { fontWeight: 500 } }, m),

                  h('td', { className: 'td-n' }, q),
                  h('td', null, r)

          )
        )
      ),

          h('code', { className: 'inline-code' }, 'evaluate(o_src, hits)'),
          ' compara descuentos y emite un estado (OK, divergencia, ausente).'
        ),
        h(CB, { lang: 'python', badge: 'pipeline completo' }, pipelineCode),

        h(H3, { n: '5.1' }, 'Complejidad comparada'),
        h('div', { className: 'ptable-wrap' },
          h('table', { className: 'ptable' },
            h('thead', null,
              h('tr', null,
                h('th', null, 'Métrica'),
                h('th', null, 'It. 1 — Polars'),
                h('th', null, 'It. 2 — Polars + calamine'),
                h('th', null, 'It. 3 — + Interval Tree 2D')
              )
            ),
            h('tbody', null,
              [
                ['Complejidad espacial',    h(M,{t:'O(n \\cdot d_1 \\cdot d_2)'}), h(M,{t:'O(n \\cdot d_1 \\cdot d_2)'}), h(M,{t:'O(n \\log n)'})],
                ['Construcción del índice', '—', '—', h(M,{t:'O(n \\log^2 n)'})],
                ['Consulta por oferta',     h(M,{t:'O(d_1 \\cdot d_2)'}), h(M,{t:'O(d_1 \\cdot d_2)'}), h(M,{t:'O(\\log^2 n + k)'})],
                ['Escalabilidad',           'Cuadrática', 'Cuadrática', 'Logarítmica'],
                ['RAM consumida',           'OOM (>16 GB)', '~9,8 GB', '~85 MB'],
                ['Tiempo total',            'No terminaba', '~18 min', '< 30 seg'],
              ].map(([m, i1, i2, i3], i) =>
                h('tr', { key: i },
                  h('td', { style: { fontWeight: 500 } }, m),
                  h('td', { className: 'td-n' }, i1),
                  h('td', { className: 'td-n' }, i2),
                  h('td', { className: 'td-g' }, i3)
                )
              )
            )
          )
        ),
        h('p', null,
          'La iteración 2 mejoró las constantes; la iteración 3 cambió el régimen. La eliminación del factor ',
          h(M, { t: 'd_1 \\cdot d_2' }), ' es el cambio cualitativo decisivo.'
        )
      ),

      // VI
      h(Sec, { id: 'VI', n: '§ 06', title: 'Resultados y conclusiones' },
        h('p', null, 'La reescritura iterativa transformó un sistema colapsado en un producto performante. Los resultados con mayor impacto operativo:'),

        h('div', { className: 'results-grid' },
          [
            { v: h(React.Fragment,null,'99',h('em',null,'%')), l: 'reducción\nde RAM' },
            { v: h(React.Fragment,null,'<',h('em',null,'30'),'s'), l: 'tiempo\ntotal' },
            { v: h(React.Fragment,null,'0',h('em',null,'%')), l: 'desviación\nresultados' },
            { v: h(React.Fragment,null,'log',h('em',null,'²n')), l: 'complejidad\nconsulta' },
          ].map((c,i) =>
            h('div', { key: i, className: 'rcard' },
              h('div', { className: 'rcard-v' }, c.v),
              h('div', { className: 'rcard-l' }, c.l)
            )
          )
        ),

        h('ul', null,
          h('li', null, h('strong', null, 'Liberación de memoria: '), 'reducción del consumo de RAM superior al 99 %, devolviendo la viabilidad a hardware de equipo.'),
          h('li', null, h('strong', null, 'Escalabilidad independiente de la duración: '), 'el negocio puede ampliar campañas a meses sin penalizar la infraestructura.'),
          h('li', null, h('strong', null, 'Validación y exactitud: '), '0 % de desviación frente al modelo de discretización diaria.'),
          h('li', null, h('strong', null, 'Trazabilidad: '), 'las tres iteraciones quedan documentadas como evidencia de método: medir, optimizar lo que aporta, reformular cuando el régimen asintótico lo exige.')
        ),

        h('p', null,
          'La conciliación termina materializándose en siete estados mutuamente excluyentes que el negocio consume directamente. El clasificador —una cadena ',
          h('code', { className: 'inline-code' }, 'when / then'),
          ' sobre el resultado del cotejo— traduce el solape geométrico a semántica operativa:'
        ),
        h(Fig, { n: '09', label: 'Árbol de decisión de los siete estados operativos',
          caption: 'Cada fila del reporte se etiqueta con exactamente uno de los siete estados. El flujo refleja la evaluación real del pipeline de conciliación y es lo que garantiza exhaustividad y auditabilidad.'
        }, h(FigStates)),

        MemFig && h(Fig, { n: '10', label: 'Comparativa visual de memoria',
          caption: 'El árbol elimina la saturación de RAM; la solución corre localmente sin hardware especializado.'
        }, h(MemFig))
      ),

      // Refs
      h(Sec, { id: 'Ref', n: '§ REF', title: 'Referencias' },
        h('ol', { className: 'refs' },
          [
            h('span',null,'Cormen, T. H., Leiserson, C. E., Rivest, R. L., & Stein, C. (2009). ',h('em',null,'Introduction to Algorithms'),', 3rd ed. MIT Press. §14.3, pp. 348–354.'),
            h('span',null,'de Berg, M., Cheong, O., van Kreveld, M., & Overmars, M. (2008). ',h('em',null,'Computational Geometry: Algorithms and Applications'),', 3rd ed. Springer. Cap. 10.'),
            h('span',null,'Edelsbrunner, H. (1983). A new approach to rectangle intersections. ',h('em',null,'Int. Journal of Computer Mathematics, 13'),'(3–4), 209–229.'),
            h('span',null,'Gaede, V., & Günther, O. (1998). Multidimensional access methods. ',h('em',null,'ACM Computing Surveys, 30'),'(2), 170–231.'),
            h('span',null,'Bentley, J. L. (1979). Decomposable searching problems. ',h('em',null,'Information Processing Letters, 8'),'(5), 244–251.'),
            h('span',null,'Vink, R. et al. (2024). ',h('em',null,'Polars: Lightning-fast DataFrame library'),'. pola.rs.'),
          ].map((r, i) => h('li', { key: i, className: 'ref' }, h('span', null, r)))
        )
      )
    ),

    // Foot
    h('footer', { className: 'foot' },
      h('span', null, 'Nelson Ponce Luna'),
      h('span', null, '© 2026  ·  v 3.1')

  );
